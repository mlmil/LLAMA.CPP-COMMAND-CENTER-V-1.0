*{box-sizing:border-box}body{margin:0;background:#0e0f11;color:#f2efe6;font-family:Inter,sans-serif}button,input,select{font:inherit}button{cursor:pointer}header{height:64px;border-bottom:1px solid #2a2d32;padding:0 32px;display:flex;align-items:center;justify-content:space-between}.brand{font:600 20px 'Inter Tight'}.brand i,h2 i{color:#e39a2b;font-style:normal}.mono{font:13px 'JetBrains Mono';letter-spacing:.06em;text-transform:uppercase;color:#c7cad0}.headleft,.headright{display:flex;align-items:center;gap:18px}.amber{color:#e39a2b}.outline{background:none;border:1px solid #e39a2b;color:#e39a2b;padding:10px 16px;text-transform:uppercase;font:13px 'JetBrains Mono'}.grid{height:calc(100vh - 64px);display:grid;grid-template-columns:340px 1fr 1fr}.rail,.gpu{min-width:0;overflow:auto}.rail{border-right:1px solid #2a2d32}.gpu{border-right:1px solid #2a2d32}.section{padding:20px 22px 14px;border-bottom:1px solid #2a2d32}.filter{margin-top:10px;width:100%;background:#17191c;color:#f2efe6;border:1px solid #2a2d32;padding:11px 12px;font:14px 'JetBrains Mono'}.row{padding:17px 22px;border-bottom:1px solid #ffffff14}.row.selected{background:#17191c;border-left:3px solid #e39a2b;padding-left:19px}.rowtop{display:flex;justify-content:space-between}.name{font-weight:600;margin-top:6px;line-height:1.4}.meta{margin-top:6px;font:12.5px 'JetBrains Mono';color:#c7cad0}.trash{color:#e05252;background:none;border:0}.gpuhead{padding:20px 26px 16px;border-bottom:1px solid #2a2d32}.status{float:right}.gpuhead h2{font:500 30px 'Inter Tight';margin:9px 0 10px}.body{padding:22px 26px;display:flex;flex-direction:column;gap:20px}.slot,.card{background:#17191c;border:1px solid #2a2d32;padding:20px}.slot.empty{border-style:dashed;text-align:center;min-height:164px;padding-top:30px}.slot.selected{border-color:#e39a2b}.slottitle{font:13px 'JetBrains Mono';letter-spacing:.08em}.emptytext{margin-top:18px;color:#c7cad0;line-height:1.6}.assign{width:100%;padding:14px;background:none;border:1px solid # </style></head><body><header><div class="headleft"><div class="brand">SPARK<span>.</span>Ai</div><div class="mono">LLAMA.CPP COMMAND CENTER V 1.0 — ORION</div></div><div class="headright"><div class="mono">ROCM 6.4 · 192.168.1.5</div><button class="outline">⚙ MODEL DATABASE</button></div></header><main class="grid"><aside class="rail"><div class="section"><div class="mono amber">§ 01 — MODEL LIBRARY</div><input id="filter" class="filter" placeholder="Filter models…"></div><div id="models"></div></aside><section id="gpu0" class="gpu"></section><section id="gpu1" class="gpu"></section></main><script>
let models=[],selected=null,assigned=(()=>{try{let a=JSON.parse(localStorage.getItem("gpuAssignedModels")||"[null,null]");return Array.isArray(a)&&a.length===2?a:[null,null]}catch(e){return [null,null]}})(),running=[false,false],pids=[null,null],params=[[8192,8,999,512],[8192,8,999,512]];const $=x=>document.querySelector(x);async function api(u,o){return fetch(u,o).then(r=>r.json())}function loadParams(){for(let i=0;i<2;i++)for(let j=0;j<4;j++){let v=localStorage.getItem('gpu'+i+'param'+j);if(v!==null)params[i][j]=+v}}async function load(){loadParams();models=await api('/api/models');let gs=await api('/api/gpus');running=gs.map(x=>x.running);assigned=gs.map(x=>x.running?x.model:null);localStorage.setItem("gpuAssignedModels",JSON.stringify(assigned));draw();}function draw(){let f=($('#filter').value||'').toLowerCase();$('#models').innerHTML=models.filter(m=>m.name.toLowerCase().includes(f)).map((m,i)=>`<div class="row ${selected===m.path?'selected':''}" onclick="selectModel('${m.path}')"><div class="rowtop"><span class="mono">${String(i+1).padStart(2,'0')}</span><span class="mono ${m.size_gb>20?'amber':''}">${m.size_gb} GB <button class="trash" onclick="event.stopPropagation();deleteModel('${m.path}')">🗑️</button></span></div><div class="name">${m.name.split('/').pop()}</div><div class="meta">GGUF · ${(m.size_gb>10?'MODEL':'QUANT')}</div></div>`).join('');[0,1].forEach(renderGpu)}function selectModel(p){selected=p;draw()}function renderGpu(i){let g=i?['RX 6600',8,8082]:['RX 7900 XT',20,8081],m=typeof assigned[i]==='string'?assigned[i]:null;let slot=m?`<div class="slot"><div class="slottitle">ASSIGNED MODEL</div><div class="name">${m.split('/').pop()}</div><div class="meta">MODEL · ${models.find(x=>x.path===m)?.size_gb||0} GB on disk</div><p class="meta amber">VRAM FIT ESTIMATE　FITS</p></div>`:`<div class="slot empty ${selected?'selected':''}" onclick="assign(${i})"><div class="slottitle">NO MODEL ASSIGNED</div><div class="emptytext">Select a model in the library, then click here —<br>or press <span class="amber">Assign</span> below.</div></div>`;let actions=selected&&!m&&!running[i]?`<button class="assign" onclick="assign(${i})">ASSIGN SELECTED → ${g[0]}</button>`:'';let clearAction=m&&!running[i]?`<button class="assign" style="margin-top:10px" onclick="clearModel(${i})">CLEAR MODEL</button>`:'';let control=running[i]?`<button class="stop" onclick="stopGpu(${i})">■ STOP SERVER</button>`:`<button class="launch" ${!m?'disabled':''} onclick="launch(${i})">▶ LAUNCH ON GPU ${i} · :${g[2]}</button>`;$('#gpu'+i).innerHTML=`<div class="gpuhead"><div class="mono amber">§ 0${i+2} — ${i?'SECONDARY':'PRIMARY'} <span class="status ${running[i]?'amber':''}">■ ${running[i]?'RUNNING':'STOPPED'}</span></div><h2>${g[0]}<i>.</i></h2><div class="mono">GPU ${i} · :${g[2]} · ${g[1]} GB</div></div><div class="body">${slot}${actions}${clearAction}<div class="card"><div class="cardtitle">LAUNCH PARAMETERS</div><select class="profile"><option>PROFILE: BALANCED</option><option>PROFILE: MAX SPEED</option><option>PROFILE: LONG CONTEXT</option></select><div class="params">${[['CONTEXT (-C)',params[i][0]],['THREADS (-T)',params[i][1]],['GPU LAYERS (-NGL)',params[i][2]],['BATCH (-B)',params[i][3]]].map((x,j)=>`<label>${x[0]}<input type="number" value="${x[1]}" oninput="params[${i}][${j}]=+this.value;localStorage.setItem('gpu${i}param${j}',this.value)"></label>`).join('')}</div></div>${control}<div class="card"><div class="cardtitle">TELEMETRY — AMD-SMI</div><div class="telemetry" style="margin-top:18px">${[['—','EDGE TEMP °C'],['—','VRAM USED GB'],['—','POWER W'],['—','GEN SPEED TOK/S']].map(x=>`<div class="metric"><strong>${x[0]}</strong><span>${x[1]}</span></div>`).join('')}</div></div><pre class="log">[status] ${running[i]?'server running':'server stopped'}</pre></div>`}async function deleteModel(path){if(!confirm("Delete this GGUF model from Orion?"))return;let r=await fetch("/api/model?path="+encodeURIComponent(path),{method:"DELETE"});let d=await r.json();if(!r.ok){alert(d.detail||"Delete failed");return}models=await api("/api/models");draw()}function assign(i){if(selected){assigned[i]=selected;localStorage.setItem("gpuAssignedModels",JSON.stringify(assigned));draw()}}function clearModel(i){assigned[i]=null;localStorage.setItem("gpuAssignedModels",JSON.stringify(assigned));draw()}async function launch(i){await api('/api/gpu/'+i+'/launch',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({model:assigned[i],ctx:params[i][0],threads:params[i][1],layers:params[i][2],batch:params[i][3],kv_offload:false})});running[i]=true;draw()}async function stopGpu(i){await api('/api/gpu/'+i+'/stop',{method:'POST'});running[i]=false;assigned[i]=null;localStorage.setItem("gpuAssignedModels",JSON.stringify(assigned));draw()}$('#filter').oninput=draw;load();setInterval(async()=>{let g=await api('/api/gpus');running=g.map(x=>x.running);draw()},3000);
</script><script>async function refreshTelemetry(i){try{let r=await api("/api/gpu/"+i+"/telemetry"),a=JSON.parse(r.raw||"[]")[0]||{},c=document.querySelectorAll("#gpu"+i+" .telemetry .metric"),x=[["hotspot_temperature"],["vram_used"],["power_usage"],["gfx"]];x.forEach((q,j)=>{let v=a[q[0]]?.value??0;if(j===1)v=(v/1024).toFixed(2);if(c[j])c[j].querySelector("strong").textContent=v+(j===1?" GB":"")})}catch(e){}}setInterval(()=>[0,1].forEach(refreshTelemetry),2000);</script><style>.rail .row{padding:11px 16px}.rail .name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rail .meta{font-size:10px}.rail .rowtop{font-size:10px}.model-pane-toggle{margin:10px 16px;width:calc(100% - 32px);padding:8px;background:#17191c;border:1px solid #e39a2b;color:#e39a2b;font:11px JetBrains Mono;text-transform:uppercase}</style><script>(function(){let r=document.documentElement,b=document.createElement("button");b.className="model-pane-toggle";b.textContent="EXPAND MODEL PANE";b.onclick=function(){let open=r.style.getPropertyValue("--rail")==="520px";r.style.setProperty("--rail",open?"340px":"520px");b.textContent=open?"EXPAND MODEL PANE":"COLLAPSE MODEL PANE"};let rail=document.querySelector(".rail");if(rail)rail.prepend(b)})();</script><style>.rail{position:relative}.model-pane-resizer{position:absolute;top:0;right:-4px;width:8px;height:100%;cursor:col-resize;z-index:50;background:transparent}.model-pane-resizer:hover{background:#e39a2b66}</style><script>(function(){let r=document.documentElement,rail=document.querySelector(".rail"),h=document.createElement("div");if(!rail)return;h.className="model-pane-resizer";rail.appendChild(h);let down=false;h.onmousedown=function(e){down=true;e.preventDefault();document.body.style.cursor="col-resize"};window.addEventListener("mousemove",function(e){if(!down)return;let w=Math.max(260,Math.min(700,e.clientX));r.style.setProperty("--rail",w+"px")});window.addEventListener("mouseup",function(){down=false;document.body.style.cursor=""})})();</script><style>.model-pane-toggle{display:none!important}</style></body></html>
